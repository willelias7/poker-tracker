<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Poker Tracker</title>
  <link rel="stylesheet" href="style.css" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
</head>
<body>

  <!-- NAV -->
  <nav class="navbar">
    <div class="nav-logo">
      <span class="logo-icon">&#9824;</span>
      <span class="logo-text">Poker Tracker</span>
    </div>
    <div class="nav-tabs">
      <button class="nav-tab active" data-page="calendar">Calendar</button>
      <button class="nav-tab" data-page="graphs">Analytics</button>
    </div>
    <div class="nav-right">
      <button class="btn-add-session" id="btn-add-session">+ Session</button>
    </div>
  </nav>

  <!-- CALENDAR PAGE -->
  <div id="page-calendar" class="page active">

    <div class="stats-bar" id="calendar-stats"></div>

    <div class="calendar-header">
      <button class="month-nav" id="prev-month">&#8592;</button>
      <h2 class="month-title" id="month-title"></h2>
      <button class="month-nav" id="next-month">&#8594;</button>
    </div>

    <div class="calendar-wrap">
      <div class="calendar-dow">
        <span>Sun</span><span>Mon</span><span>Tue</span>
        <span>Wed</span><span>Thu</span><span>Fri</span><span>Sat</span>
      </div>
      <div class="calendar-grid" id="calendar-grid"></div>
    </div>

  </div>

  <!-- GRAPHS PAGE -->
  <div id="page-graphs" class="page">

    <div class="stats-bar" id="graphs-stats"></div>

    <div class="charts-grid">

      <div class="chart-card">
        <div class="chart-card-header">
          <h3>All-Time Earnings</h3>
          <span class="chart-subtitle">Cumulative profit over every session</span>
        </div>
        <div class="chart-wrap">
          <canvas id="chart-alltime"></canvas>
        </div>
      </div>

      <div class="chart-card">
        <div class="chart-card-header">
          <h3>Summer Earnings</h3>
          <span class="chart-subtitle">Cumulative profit — Jun through Aug</span>
        </div>
        <div class="chart-wrap">
          <canvas id="chart-summer"></canvas>
        </div>
      </div>

      <div class="chart-card chart-card-full">
        <div class="chart-card-header">
          <h3>Summer Hourly Rate</h3>
          <span class="chart-subtitle">Running $/hr over summer sessions</span>
        </div>
        <div class="chart-wrap">
          <canvas id="chart-hourly"></canvas>
        </div>
      </div>

    </div>
  </div>

  <!-- MODAL -->
  <div id="modal-overlay" class="modal-overlay hidden">
    <div class="modal">
      <div class="modal-header">
        <h3 id="modal-title">Session</h3>
        <button class="modal-close" id="modal-close">&times;</button>
      </div>

      <!-- Sessions list for a day -->
      <div id="sessions-list" class="sessions-list hidden"></div>

      <!-- Add / Edit form -->
      <div id="session-form-wrap">
        <form id="session-form" class="session-form">
          <input type="hidden" id="form-id" />

          <div class="form-row">
            <div class="form-group">
              <label>Date</label>
              <input type="date" id="form-date" required />
            </div>
            <div class="form-group">
              <label>Hours Played</label>
              <input type="number" id="form-hours" placeholder="0.0" step="0.25" min="0" required />
            </div>
          </div>

          <div class="form-row">
            <div class="form-group">
              <label>Buy-In ($)</label>
              <input type="number" id="form-buyin" placeholder="0" min="0" required />
            </div>
            <div class="form-group">
              <label>Cash-Out ($)</label>
              <input type="number" id="form-cashout" placeholder="0" min="0" required />
            </div>
          </div>

          <div class="form-net" id="form-net">Net: —</div>

          <div class="form-group">
            <label>Venue <span class="optional">(optional)</span></label>
            <input type="text" id="form-venue" placeholder="Casino, home game, online..." />
          </div>

          <div class="form-group">
            <label>Notes <span class="optional">(optional)</span></label>
            <textarea id="form-notes" placeholder="Key hands, observations..." rows="2"></textarea>
          </div>

          <div class="form-actions">
            <button type="button" class="btn-secondary" id="btn-cancel-form">Cancel</button>
            <button type="submit" class="btn-primary" id="btn-save">Save Session</button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
